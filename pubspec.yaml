name: n5001
description: "A comprehensive, offline-first JLPT N5 Japanese learning application."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  flutter_native_splash: ^2.4.8
  permission_handler: ^12.0.3
  shared_preferences: ^2.5.5
  isar: ^3.1.0+1
  crypto: ^3.0.7
  isar_flutter_libs: ^3.1.0+1
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/icons/

  fonts:
    - family: Baloo 2
      fonts:
        - asset: assets/fonts/Baloo2-Regular.ttf
        - asset: assets/fonts/Baloo2-Medium.ttf
          weight: 500
        - asset: assets/fonts/Baloo2-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Baloo2-Bold.ttf
          weight: 700

flutter_native_splash:
  color: "#42a5f5"
  image: assets/images/icons/cloud.png
  fullscreen: true # default false
  android_12:
    image: assets/images/icons/cloud.png
    color: "#42a5f5"
    icon_background_color: "#111111"
